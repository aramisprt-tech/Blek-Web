<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Blek - Tu estantería de libros en un solo lugar</title>
    <meta name="description" content="La app definitiva para mantener tus hábitos de lectura, con timer, rachas amigables, clubes de lectura y más." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- reCAPTCHA v3 (invisible, loaded async) -->
    <script>
      // Load reCAPTCHA only when site key is available (set via Vite env)
      (function() {
        var siteKey = '%VITE_RECAPTCHA_SITE_KEY%';
        if (siteKey && siteKey !== '%VITE_RECAPTCHA_SITE_KEY%' && siteKey !== 'REEMPLAZA_CON_TU_SITE_KEY') {
          var s = document.createElement('script');
          s.src = 'https://www.google.com/recaptcha/api.js?render=' + siteKey;
          s.async = true;
          document.head.appendChild(s);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
